name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write      # create the release, upload assets
  packages: write      # push GHCR images
  id-token: write      # keyless cosign signing
  actions: write       # dispatch the package-repo workflow at the end

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: a tag must never ship untested commits. The release job only runs
  # once the full test suite passes on the tagged commit.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Run tests
        run: go test ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional publishing channels. Each stays inert (skip_upload) until
          # its secret is set, so releases never fail for a missing one.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
      - name: Build the package repository
        # A release published with GITHUB_TOKEN does not fire 'release: published',
        # so dispatch the repo build explicitly (workflow_dispatch is exempt).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run repo.yml --ref main
