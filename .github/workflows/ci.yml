name: CI

on:
  push:
    branches: [main, dev, 'release/**']
  pull_request:
    branches: [main, dev, 'release/**']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Frontend lint
        run: |
          cd web
          npm ci
          npx eslint src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  sandbox:
    name: Sandbox E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Dry-run end-to-end (no external DNS/ACME, no privileges)
        run: go test -count=1 -tags=sandbox -timeout=180s ./test/sandbox/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Build orchestrator
        run: go build -o nurproxy ./cmd/nurproxy
      - name: Build agent
        run: go build -o nurproxy-agent ./cmd/nurproxy-agent
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            nurproxy
            nurproxy-agent
