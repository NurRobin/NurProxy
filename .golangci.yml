version: "2"

run:
  timeout: 5m

linters:
  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: _test\.go
        linters:
          - gocritic
          - errcheck
      - path: cmd/
        linters:
          - gocritic
      - linters:
          - errcheck
        source: "defer .+\\.Close\\(\\)"
      - linters:
          - errcheck
        source: "w\\.Write\\("
      - linters:
          - errcheck
        source: "json\\.NewEncoder\\(w\\)\\.Encode"
      - linters:
          - errcheck
        source: "io\\.Copy\\(io\\.Discard"
      - linters:
          - errcheck
        source: "tx\\.Rollback\\(\\)"
      - linters:
          - errcheck
        source: "sqlDB\\.Close\\(\\)"
      - linters:
          - errcheck
        source: "\\.Shutdown\\("
      - linters:
          - errcheck
        source: "f\\.Close\\(\\)"
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
  settings:
    gocritic:
      enabled-checks:
        - badLock
        - badRegexp
        - builtinShadowDecl
        - nilValReturn
        - regexpPattern
        - sloppyReassign
        - sortSlice
        - sprintfQuotedString
        - sqlQuery
        - syncMapLoadAndDelete
        - truncateCmp
        - unnecessaryDefer
        - weakCond
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nurrobin/nurproxy
  exclusions:
    paths:
      - web/node_modules

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
